<div class="wrap">
  <div class="panel" id="joinPanel">
    <h3>Join encounter</h3>
    <div class="sheet-grid">
      <label>Name<input id="nameInput" placeholder="Your name" /></label>
      <label>AC<input id="joinAcInput" type="number" placeholder="Optional" /></label>
      <label>HP<input id="joinHpInput" type="number" placeholder="Optional" /></label>
      <label>Max HP<input id="joinHpMaxInput" type="number" placeholder="Optional" /></label>
      <label>Temp HP<input id="joinTempHpInput" type="number" placeholder="Optional" /></label>
    </div>
    <div class="row"><button id="joinBtn" type="button">Join</button></div>
    <div class="row"><button id="showQrBtn" class="secondary-btn" type="button">Show QR-Code</button></div>
    <div id="joinMsg"></div>
  </div>
  <div class="panel qr-panel" id="qrPanel" hidden>
    <h3>Join via QR-Code</h3>
    <div class="qr-image-wrap">
      <div class="qr-image-frame">
        <img id="qrImage" alt="Join encounter QR code" />
      </div>
    </div>
    <a id="qrLink" class="qr-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    <div class="row"><button id="qrBackBtn" class="secondary-btn" type="button">Back</button></div>
  </div>
  <div id="appPanel" class="app-shell" hidden>
    <div class="app-header row"><strong id="title">Encounter</strong></div>
    <div id="status"></div>
    <div id="list"></div>
  </div>
</div>
<div id="initiativeGate" class="initiative-gate" aria-live="polite">
  <div class="initiative-gate-card">
    <h2>Roll Initiative!</h2>
    <input id="initiativeGateInput" type="number" inputmode="numeric" placeholder="Initiative total" />
    <div class="initiative-roll-toggle">
      <button id="initiativeNat1Btn" class="initiative-roll-btn hex-only" type="button" aria-label="Natural 1">
        <span class="initiative-mini-hex hex red">
          <svg data-ec-icon="hexagon" viewBox="0 0 32 32" aria-hidden="true"><path></path></svg>
          <span>1</span>
        </span>
      </button>
      <button id="initiativeNormalBtn" class="initiative-roll-btn is-active" type="button"><span>Normal</span></button>
      <button id="initiativeNat20Btn" class="initiative-roll-btn hex-only" type="button" aria-label="Natural 20">
        <span class="initiative-mini-hex hex green">
          <svg data-ec-icon="hexagon" viewBox="0 0 32 32" aria-hidden="true"><path></path></svg>
          <span>20</span>
        </span>
      </button>
    </div>
    <button id="initiativeGateSubmit" type="button">Submit initiative</button>
  </div>
</div>
<div id="sheetRoot" class="sheet" hidden>
  <div class="sheet-handle" aria-hidden="true"></div>
  <div id="editPanel" class="sheet-panel">
    <div class="sheet-grid">
      <label>AC<input id="sheetAc" type="number" placeholder="AC" /></label>
      <label>HP<input id="sheetHp" type="number" placeholder="HP" /></label>
      <label>Max HP<input id="sheetHpMax" type="number" placeholder="Max HP" /></label>
      <label>Temp HP<input id="sheetTempHp" type="number" placeholder="Temp HP" /></label>
    </div>
  </div>
  <div class="sheet-header">
    <div id="sheetSummary" class="sheet-summary">
      <div class="sheet-player-summary">
        <div class="sheet-player-main">
          <span class="initiative"><svg data-ec-icon="hexagon" viewBox="0 0 32 32" aria-hidden="true"><path></path></svg><span>-</span></span>
          <span class="sheet-player-name-block"><span class="sheet-player-name">-</span><span class="sheet-player-health is-healthy">healthy</span></span>
        </div>
        <span class="sheet-player-vitals">
          <span class="sheet-player-heart"><svg data-ec-icon="heart" viewBox="0 0 32 32" aria-hidden="true"><path></path></svg></span>
          <span class="sheet-summary-hp">-/-</span>
          <span class="sheet-summary-temp">+0</span>
        </span>
        <span class="sheet-summary-shield"><svg data-ec-icon="shield" viewBox="0 0 32 32" aria-hidden="true"><path></path></svg><span>-</span></span>
      </div>
    </div>
  </div>
  <div id="damagePanel" class="sheet-panel">
    <div class="sheet-grid">
      <label>Damage / heal<input id="sheetDamage" type="number" placeholder="e.g. 7 damage or -7 heal" /></label>
    </div>
  </div>
  <div id="deathSavePanel" class="sheet-panel death-save-panel">
    <div class="death-save-editor">
      <div class="death-save-editor-row">
        <span class="death-save-editor-icon is-failure" aria-hidden="true">
          <svg data-ec-icon="skull" viewBox="0 0 32 32"><path></path></svg>
        </span>
        <div class="death-save-editor-diamonds">
          <button id="deathFail1" type="button" class="death-save-diamond-btn" data-track="failures" data-value="1">◆</button>
          <button id="deathFail2" type="button" class="death-save-diamond-btn" data-track="failures" data-value="2">◆</button>
          <button id="deathFail3" type="button" class="death-save-diamond-btn" data-track="failures" data-value="3">◆</button>
        </div>
      </div>
      <div class="death-save-editor-row">
        <span class="death-save-editor-icon is-success" aria-hidden="true">
          <svg data-ec-icon="heart" viewBox="0 0 32 32"><path></path></svg>
        </span>
        <div class="death-save-editor-diamonds">
          <button id="deathSuccess1" type="button" class="death-save-diamond-btn" data-track="successes" data-value="1">◆</button>
          <button id="deathSuccess2" type="button" class="death-save-diamond-btn" data-track="successes" data-value="2">◆</button>
          <button id="deathSuccess3" type="button" class="death-save-diamond-btn" data-track="successes" data-value="3">◆</button>
        </div>
      </div>
      <button id="deathSaveCloseBtn" type="button" class="secondary-btn death-confirm-btn death-confirm-btn-static">Close</button>
      <div id="confirmDeathCta" class="death-confirm-cta">
        <button id="confirmDeathBtn" type="button" class="secondary-btn death-confirm-btn death-confirm-btn-accent">Confirm death</button>
      </div>
      <div id="confirmSavedCta" class="death-confirm-cta">
        <button id="confirmSavedBtn" type="button" class="secondary-btn death-confirm-btn death-confirm-btn-accent">Confirm stabilized</button>
      </div>
    </div>
  </div>
  <div id="sheetActions" class="sheet-actions">
    <button id="editModeBtn" type="button">Edit stats</button>
    <button id="damageModeBtn" type="button">Damage <span class="sep">|</span> Heal</button>
  </div>
  <div id="sheetDeathCta" class="sheet-turn-cta">
    <button id="deathSaveModeBtn" type="button">Death saves</button>
  </div>
  <div id="sheetTurnCta" class="sheet-turn-cta">
    <button id="endRoundBtn" type="button">End round</button>
  </div>
</div>
